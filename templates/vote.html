<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote Page</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #0f0c29;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(to right, #0f0c29, #302b63, #24243e);
        }

        .box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            position: relative;
            z-index: 10;
            margin-top: 80px;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            color: #00f260;
            text-shadow: 0 0 10px rgba(0, 242, 96, 0.5);
            margin-bottom: 30px;
            letter-spacing: 1px;
            font-size: 1.8em;
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: linear-gradient(45deg, #0575e6, #021b79);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(5, 117, 230, 0.4);
        }

        button:hover {
            background: linear-gradient(45deg, #021b79, #0575e6);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(5, 117, 230, 0.6);
        }

        button:active {
            transform: translateY(0);
        }
        .app-header {
            position: fixed;
            top: 20px;
            left: 30px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .app-header {
                left: 50%;
                transform: translateX(-50%);
                width: 100%;
                justify-content: center;
                background: rgba(15, 12, 41, 0.8);
                padding: 10px 0;
                top: 0;
            }
            .box {
                margin-top: 100px;
                padding: 30px 20px;
            }
            h2 {
                font-size: 1.5em;
            }
            button {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <canvas id="bgCanvas"></canvas>

    <!-- APP HEADER: LOGO & TITLE -->
    <div class="app-header">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="YC Tech Logo"
            style="width: 50px; filter: drop-shadow(0 0 5px #00f260);">
        <div style="color: white; font-weight: bold; font-size: 1.2em; text-transform: uppercase;">You Can Technologies
        </div>
    </div>

    <div class="box">
        <h2>Select Candidate</h2>

        <!-- IMPORTANT: must point to vote route -->
        <form action="{{ url_for('vote_page', cs_id=cs_id) }}" method="POST">
            <!-- Hidden CS ID -->
            <input type="hidden" name="cs_id" value="{{ cs_id }}">

            <button type="submit" name="candidate" value="Candidate A">Candidate A</button>
            <button type="submit" name="candidate" value="Candidate B">Candidate B</button>
            <button type="submit" name="candidate" value="Candidate C">Candidate C</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='vote_bg.js') }}"></script>
</body>

</html>
