<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Voter Registration / Eye Scan</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            /* Prevent scrollbars from canvas */
            background-color: #0f0c29;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(to right, #0f0c29, #302b63, #24243e);
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #00f260;
            text-shadow: 0 0 10px rgba(0, 242, 96, 0.5);
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .video-container {
            position: relative;
            width: 400px;
            height: 300px;
            margin: 0 auto 20px auto;
            border: 2px solid #0575e6;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(5, 117, 230, 0.3);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .circle-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 2px dashed #00f260;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 242, 96, 0.5);
            animation: spin 10s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            text-align: center;
        }

        button {
            padding: 12px 25px;
            margin: 10px 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button[type="button"] {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
        }

        button[type="submit"] {
            background: linear-gradient(45deg, #00f260, #0575e6);
            color: white;
            box-shadow: 0 5px 15px rgba(0, 242, 96, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    <canvas id="bgCanvas"></canvas>

    <!-- APP HEADER: LOGO & TITLE -->
    <div style="position: fixed; top: 20px; left: 30px; z-index: 1000; display: flex; align-items: center; gap: 15px;">
        <img src="{{ url_for('static', filename='logo.svg') }}" alt="YC Tech Logo"
            style="width: 50px; filter: drop-shadow(0 0 5px #00f260);">
        <div style="color: white; font-weight: bold; font-size: 1.2em; text-transform: uppercase;">You Can Technologies
        </div>
    </div>
    <div class="card">
        <h1>Voter Registration / Eye Scan</h1>
        <div class="video-container">
            <video id="video" autoplay></video>
            <div class="circle-overlay"></div>
            <!-- Add a scanning line -->
            <div
                style="position: absolute; top:0; left:0; width:100%; height:2px; background:#00f260; box-shadow: 0 0 10px #00f260; animation: scan 2s infinite ease-in-out;">
            </div>
        </div>

        <button type="button" onclick="captureFrame()">CAPTURE IRIS</button>

        <form id="voterForm" method="POST" onsubmit="return validateForm()">
            <input type="hidden" name="eye_image" id="eye_image">
            <input type="text" name="voter_id" placeholder="ENTER VOTER ID" required><br>
            <button type="submit">Complete Registration</button>
        </form>
    </div>

    <style>
        @keyframes scan {
            0% {
                top: 0;
                opacity: 0.5;
            }

            50% {
                top: 100%;
                opacity: 1;
            }

            100% {
                top: 0;
                opacity: 0.5;
            }
        }
    </style>

    <script src="{{ url_for('static', filename='vote_bg.js') }}"></script>

    <script>
        const video = document.getElementById('video');

        // Access webcam
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => console.error("Webcam error: ", err));

        // Capture frame inside canvas and send to Flask
        function captureFrame() {
            const canvas = document.createElement('canvas');
            canvas.width = 400;   // match video width
            canvas.height = 300;  // match video height
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height); // Capture full resolution
            const dataURL = canvas.toDataURL('image/png', 0.8);
            document.getElementById('eye_image').value = dataURL;

            // Visual feedback
            const btn = document.querySelector('button[type="button"]');
            btn.innerHTML = "IRIS CAPTURED!";
            btn.style.background = "#2ecc71";
            setTimeout(() => {
                btn.innerHTML = "CAPTURE IRIS";
                btn.style.background = ""; // reset
            }, 2000);
        }

        function validateForm() {
            const img = document.getElementById('eye_image').value;
            if (!img) {
                alert("Please capture your iris scan first!");
                return false;
            }
            return true;
        }
    </script>
</body>

</html>
