<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #0f0c29;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(to right, #0f0c29, #302b63, #24243e);
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h1 {
            color: #00f260;
            text-shadow: 0 0 10px rgba(0, 242, 96, 0.5);
            margin-bottom: 30px;
            font-size: 1.8em;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #0575e6;
            box-shadow: 0 0 10px rgba(5, 117, 230, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: linear-gradient(45deg, #0575e6, #021b79);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(5, 117, 230, 0.4);
        }

        button:hover {
            background: linear-gradient(45deg, #021b79, #0575e6);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(5, 117, 230, 0.6);
        }
    </style>
</head>

<body>
    <canvas id="bgCanvas"></canvas>

    <div class="login-box">
        <h1>Admin Access</h1>
        <form method="POST">
            <input type="password" name="password" placeholder="Enter Secure Key" required>
            <br>
            <button type="submit">Authenticate</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='vote_bg.js') }}"></script>
</body>

</html>
